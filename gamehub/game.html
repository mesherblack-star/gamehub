<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Game — GameHub</title>
  <meta name="description" id="page-desc" content="Game details, ratings, and reviews on GameHub.">
  <link rel="icon" href="assets/placeholder.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="sidebar-overlay" class="overlay"></div>

  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">GH</div>
        <span class="logo-text">GameHub</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="index.html" class="nav-item" data-page="index.html">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></span>
          <span class="nav-label">Home</span>
        </a>
        <a href="search.html" class="nav-item" data-page="search.html">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
          <span class="nav-label">Browse Games</span>
        </a>
        <a href="bookmarks.html" class="nav-item" data-page="bookmarks.html">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span>
          <span class="nav-label">Bookmarks</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="profile.html" class="nav-item" data-page="profile.html">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <span class="nav-label">Profile</span>
        </a>
      </div>
    </aside>

    <div class="main-content" id="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebar-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <a href="index.html" style="color:var(--text-muted);font-size:0.875rem;display:flex;align-items:center;gap:6px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
          </a>
        </div>
        <div class="topbar-right">
          <button class="topbar-btn" id="theme-toggle" title="Toggle theme">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
          <a href="login.html" class="btn btn-primary btn-sm" id="auth-btn">Login</a>
          <div class="user-menu" id="user-menu" style="display:none">
            <div class="user-avatar" id="user-avatar" title="User menu"></div>
            <div class="user-dropdown" id="user-dropdown">
              <div class="dropdown-header">
                <div class="dropdown-username" id="dropdown-username"></div>
                <div class="dropdown-email" id="dropdown-email"></div>
              </div>
              <a href="profile.html" class="dropdown-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> My Profile</a>
              <div class="dropdown-divider"></div>
              <div class="dropdown-item danger" onclick="Auth.logout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg> Logout</div>
            </div>
          </div>
        </div>
      </header>

      <main class="page-content" id="game-detail-container">
        <div style="display:flex;align-items:center;justify-content:center;min-height:400px">
          <div class="loader"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/rating.js"></script>
  <script src="js/games.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/search.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (async () => {
      UI.initToasts();
      UI.initSidebar();
      UI.initThemeToggle();
      await Auth.init();
      UI.updateAuthUI();
      UI.initUserMenu();

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        const currentUrl = window.location.href;
        sessionStorage.setItem("redirectAfterLogin", currentUrl);

        window.location.href = "login.html";
      }
      const params = new URLSearchParams(window.location.search);
      const gameId = params.get('id');

      if (!gameId) {
        document.getElementById('game-detail-container').innerHTML = UI.emptyStateHTML('<img src="assets/placeholder.svg" alt="Game Icon" style="width: 50px; height: 50px;">', 'Game not found', 'Invalid game ID');
        return;
      }

      let game, user, userRating, subscription;
      const STORE_CONFIG = {
        store_url: { label: 'Play Now', color: '#16b518', hover: '#3fa642' },
      };

      const buildStoreLinks = (g) => {
        const links = Object.entries(STORE_CONFIG)
          .filter(([key]) => g[key])
          .map(([key, cfg]) =>
            `<a href="${g[key]}" target="_blank" rel="noopener noreferrer"
                class="btn w-full"
                style="background:${cfg.color};color:#fff;border:none;justify-content:flex-start;gap:10px;padding:11px 16px;font-size:0.875rem"
                onmouseover="this.style.background='${cfg.hover}'"
                onmouseout="this.style.background='${cfg.color}'">
              ${cfg.label}
              <svg style="margin-left:auto;opacity:0.6" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
            </a>`
          ).join('');
        if (!links) return `<div style="padding:10px;text-align:center;font-size:0.8rem;color:var(--text-muted);background:var(--bg-secondary);border-radius:var(--radius-md)">No store links available</div>`;
        return `<div style="margin-bottom:6px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:600">Play This Game</div>` + links;
      };
      const renderPage = async () => {
        try {
          game = await Games.fetchGame(gameId);
          user = Auth.getCurrentUser();
          userRating = user ? await Rating.getUserRating(gameId, user.id) : null;
          const isBookmarked = user ? await Games.isBookmarked(user.id, gameId) : false;

          // Update meta
          document.getElementById('page-title').textContent = `${game.title} — GameHub`;
          document.getElementById('page-desc').setAttribute('content', game.description?.slice(0,160) || '');

          document.getElementById('game-detail-container').innerHTML = `
            <!-- Hero -->
            <div class="game-detail-hero">
              <div class="hero-bg">
                <img src="${game.cover_url || ''}" alt="${game.title}" loading="lazy">
                <div class="hero-bg-overlay"></div>
                <div class="hero-grid-overlay"></div>
              </div>
              <div class="hero-content">
                <div class="hero-badge"><img src="assets/placeholder.svg" alt="Game Icon" style="width: 16px; height: 16px; margin-right: 4px; display: inline;"> ${game.genre || 'Game'}</div>
                <h1 style="font-family:'Orbitron',monospace;font-size:clamp(1.5rem,4vw,3rem);font-weight:900;margin-bottom:8px">${game.title}</h1>
                <div style="color:var(--text-muted);font-size:0.9rem">${game.developer || ''} · ${game.release_date ? new Date(game.release_date).getFullYear() : ''}</div>
              </div>
            </div>

            <!-- Content Grid -->
            <div class="game-detail-content">
              <!-- Cover -->
              <div>
                <div class="game-cover">
                  <img src="${game.cover_url || 'assets/placeholder.jpg'}" alt="${game.title}" loading="lazy">
                </div>
                <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
                  ${buildStoreLinks(game)}
                  <button class="btn btn-outline w-full" id="bookmark-btn" onclick="handleBookmark()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="${isBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    <span id="bookmark-label">${isBookmarked ? 'Bookmarked' : 'Add Bookmark'}</span>
                  </button>
                </div>
              </div>

              <!-- Info -->
              <div class="game-info-block">
                <h1 class="game-info-title">${game.title}</h1>
                <div class="game-tags">
                  ${game.genre ? `<span class="tag tag-genre">${game.genre}</span>` : ''}
                  ${(game.platforms || []).map(p => `<span class="tag tag-platform">${p}</span>`).join('')}
                </div>

                <!-- Rating Summary -->
                <div class="game-rating-summary">
                  <div class="rating-score-big">${game.avg_rating || '—'}</div>
                  <div class="rating-details">
                    <div>${Rating.renderStars(game.avg_rating)}</div>
                    <div class="rating-count">${game.rating_count} rating${game.rating_count !== 1 ? 's' : ''}</div>
                  </div>
                  <div style="margin-left:auto" id="rating-dist"></div>
                </div>

                <!-- Meta -->
                <div class="game-meta-list">
                  <div class="meta-item">
                    <div class="meta-label">Developer</div>
                    <div class="meta-value">${game.developer || 'Unknown'}</div>
                  </div>
                  <div class="meta-item">
                    <div class="meta-label">Release Date</div>
                    <div class="meta-value">${game.release_date ? new Date(game.release_date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : 'TBA'}</div>
                  </div>
                  <div class="meta-item">
                    <div class="meta-label">Genre</div>
                    <div class="meta-value">${game.genre || 'Unknown'}</div>
                  </div>
                  <div class="meta-item">
                    <div class="meta-label">Total Ratings</div>
                    <div class="meta-value">${game.rating_count}</div>
                  </div>
                </div>

                <!-- Description -->
                <h3 style="margin-bottom:12px;font-family:'Rajdhani',sans-serif">About</h3>
                <p class="game-description">${game.description || 'No description available.'}</p>
              </div>
            </div>

            <!-- Rating Section -->
            <div class="rating-section" id="rating-section">
              <h3 class="section-heading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#fbbf24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Rate This Game
              </h3>
              ${user ? `
                <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:12px">${userRating ? `Your current rating: ${userRating}/5 — update below` : 'Select your rating:'}</p>
                <div id="star-picker-container"></div>
                <button class="btn btn-primary" id="submit-rating-btn" style="margin-top:16px" disabled>Submit Rating</button>
              ` : `
                <div style="padding:20px;text-align:center;color:var(--text-muted)">
                  <a href="login.html" class="btn btn-primary">Login to Rate</a>
                  <p style="margin-top:12px;font-size:0.875rem">Join GameHub to rate and review games</p>
                </div>
              `}
            </div>

            <!-- Comments Section -->
            <div class="comments-section">
              <h3 class="section-heading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Comments
                <span id="comment-count" class="section-badge" style="margin-left:8px">0</span>
              </h3>
              ${user ? `
                <div class="form-group">
                  <textarea class="form-input form-textarea" id="comment-input" placeholder="Share your thoughts about ${game.title}..." rows="3"></textarea>
                </div>
                <button class="btn btn-primary" id="submit-comment-btn">Post Comment</button>
              ` : `
                <div style="padding:16px;background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:20px;text-align:center;color:var(--text-muted);font-size:0.875rem">
                  <a href="login.html" style="color:var(--accent-neon)">Login</a> to leave a comment
                </div>
              `}
              <div id="comments-list" style="margin-top:20px">
                <div style="text-align:center;padding:20px;color:var(--text-muted)">Loading comments...</div>
              </div>
              <div id="comments-pagination"></div>
            </div>
          `;

          // Init rating picker
          if (user) {
            let selectedRating = userRating || 0;
            const picker = Rating.renderStarPicker('star-picker-container', userRating || 0, (val) => {
              selectedRating = val;
              document.getElementById('submit-rating-btn').disabled = false;
            });

            document.getElementById('submit-rating-btn').addEventListener('click', async () => {
              if (!selectedRating) return;
              const btn = document.getElementById('submit-rating-btn');
              btn.disabled = true;
              btn.textContent = 'Saving...';
              try {
                const result = await Rating.submitRating(gameId, user.id, selectedRating);
                UI.toast(result.isUpdate ? 'Rating updated!' : 'Rating submitted!', 'success');
                // Refresh game data
                game = await Games.fetchGame(gameId);
                const ratingEl = document.querySelector('.rating-score-big');
                const starsEl = document.querySelector('.rating-details .stars');
                const countEl = document.querySelector('.rating-count');
                if (ratingEl) ratingEl.textContent = game.avg_rating || '—';
                if (countEl) countEl.textContent = `${game.rating_count} rating${game.rating_count !== 1 ? 's' : ''}`;
                btn.textContent = 'Rating Saved ✓';
                btn.disabled = false;
              } catch(e) {
                UI.toast('Failed to submit rating: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Submit Rating';
              }
            });
          }

          // Init bookmark
          window.handleBookmark = async () => {
            if (!user) { UI.toast('Please login to bookmark', 'info'); return; }
            const btn = document.getElementById('bookmark-btn');
            const label = document.getElementById('bookmark-label');
            const svg = btn.querySelector('svg');
            try {
              const added = await Games.toggleBookmark(user.id, gameId);
              svg.setAttribute('fill', added ? 'currentColor' : 'none');
              label.textContent = added ? 'Bookmarked' : 'Add Bookmark';
              UI.toast(added ? 'Bookmarked!' : 'Bookmark removed', added ? 'success' : 'info');
            } catch(e) {
              UI.toast('Failed to update bookmark', 'error');
            }
          };

          // Load comments
          await loadComments(1);

          // Submit comment
          if (user) {
            document.getElementById('submit-comment-btn')?.addEventListener('click', async () => {
              const input = document.getElementById('comment-input');
              const content = input?.value?.trim();
              if (!content) { UI.toast('Please write a comment', 'warning'); return; }
              const btn = document.getElementById('submit-comment-btn');
              btn.disabled = true;
              btn.textContent = 'Posting...';
              try {
                await Comments.submitComment(gameId, user.id, content);
                input.value = '';
                UI.toast('Comment posted!', 'success');
                await loadComments(1);
                btn.disabled = false;
                btn.textContent = 'Post Comment';
              } catch(e) {
                UI.toast('Failed to post: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Post Comment';
              }
            });
          }

        } catch(e) {
          document.getElementById('game-detail-container').innerHTML = UI.emptyStateHTML('⚠️', 'Failed to load game', e.message);
        }
      };

      let currentCommentPage = 1;
      const loadComments = async (page = 1) => {
        currentCommentPage = page;
        const listEl = document.getElementById('comments-list');
        const pagEl = document.getElementById('comments-pagination');
        const countEl = document.getElementById('comment-count');
        if (!listEl) return;

        listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)"><div class="loader" style="width:24px;height:24px;margin:auto"></div></div>';

        try {
          const { data, count, totalPages } = await Comments.fetchComments(gameId, { page, pageSize: 10 });
          if (countEl) countEl.textContent = count || 0;
          if (!data.length && page === 1) {
            listEl.innerHTML = UI.emptyStateHTML('<img src="assets/placeholder.svg" alt="Comments Icon" style="width: 50px; height: 50px;">', 'No comments yet', 'Be the first to comment!');
          } else {
            const uid = user?.id || null;
            listEl.innerHTML = data.map(c => Comments.renderComment(c, uid)).join('');
          }
          if (pagEl) {
            pagEl.innerHTML = UI.paginationHTML(page, totalPages);
          }
        } catch(e) {
          listEl.innerHTML = UI.emptyStateHTML('⚠️', 'Failed to load comments', e.message);
        }
      };

      // Register page change callback once during initialization
      UI.onPageChange(loadComments);

      await renderPage();
    })();
  </script>
</body>
</html>
