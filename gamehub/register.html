<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — GameHub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div class="auth-page">
    <div class="auth-bg-grid"></div>
    <div class="auth-bg-glow"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">GH</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join the GameHub community</p>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="username" placeholder="YourGameTag" autocomplete="username" maxlength="32">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirm-password" placeholder="Repeat password" autocomplete="new-password">
      </div>
      <button class="btn btn-primary w-full" id="register-btn" onclick="handleRegister()" style="margin-top:8px;padding:13px">Create Account</button>
      <p style="text-align:center;margin-top:20px;font-size:0.875rem;color:var(--text-muted)">
        Already have an account? <a href="login.html" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    UI.initToasts();
    Auth.redirectIfLoggedIn('/index.html');

    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!username || !email || !password) { UI.toast('Please fill all fields', 'warning'); return; }
      if (username.length < 3) { UI.toast('Username must be at least 3 characters', 'warning'); return; }
      if (password.length < 6) { UI.toast('Password must be at least 6 characters', 'warning'); return; }
      if (password !== confirm) { UI.toast('Passwords do not match', 'error'); return; }

      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        await Auth.register(email, password, username);
        UI.toast('Account created! Please check your email to verify.', 'success');
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch(e) {
        UI.toast(e.message || 'Registration failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
