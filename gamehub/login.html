<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GameHub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div class="auth-page">
    <div class="auth-bg-grid"></div>
    <div class="auth-bg-glow"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">GH</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your GameHub account</p>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary w-full" id="login-btn" onclick="handleLogin()" style="margin-top:8px;padding:13px">Sign In</button>
      <p style="text-align:center;margin-top:20px;font-size:0.875rem;color:var(--text-muted)">
        Don't have an account? <a href="register.html" class="auth-link">Create one</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    UI.initToasts();
    UI.initThemeToggle();
    Auth.redirectIfLoggedIn('index.html');

    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { UI.toast('Please fill all fields', 'warning'); return; }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        await Auth.login(email, password);
        UI.toast('Welcome back!', 'success');
        const redirect = sessionStorage.getItem('redirectAfterLogin');
        sessionStorage.removeItem('redirectAfterLogin');
        setTimeout(() => window.location.href = redirect || 'index.html', 800);
      } catch(e) {
        console.error('Login form error', e);
        UI.toast(e.message || e || 'Login failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
