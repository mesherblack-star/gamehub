<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Critters - Pilih Hewan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe6ee 0%, #e6f2ff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            max-height: 650px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .back-button {
            position: absolute;
            left: 20px;
            top: 20px;
            background-color: #5cc5ff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 3px 0 #0099ff;
            transition: all 0.2s;
            z-index: 100;
            font-size: 0.9rem;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #0099ff;
        }

        .back-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 0 #0099ff;
        }

        .page-title {
            font-size: 1.8rem;
            color: #ff6b9d;
            text-shadow: 1px 1px 0 #ffd1dc;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .page-subtitle {
            font-size: 0.9rem;
            color: #5cc5ff;
            font-weight: 600;
        }

        .carousel-container {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel {
            width: 100%;
            height: 350px;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .carousel-item {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .animal-image-container {
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background: transparent;
        }

        .animal-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.3s;
            filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.1));
        }

        .animal-name {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 6px 20px;
            border-radius: 40px;
            border: 2px solid;
            box-shadow: 0 3px 0;
            min-width: 150px;
        }

        /* WARNA KHUSUS UNTUK SETIAP HEWAN */
        .animal-name.ayam {
            color: #FFD166;
            border-color: #FFD166;
            box-shadow: 0 3px 0 #E6B850;
            text-shadow: 1px 1px 0 #FFF9E6;
        }

        .animal-name.bebek {
            color: #5CC5FF;
            border-color: #5CC5FF;
            box-shadow: 0 3px 0 #4AA3D6;
            text-shadow: 1px 1px 0 #E6F4FF;
        }

        .animal-name.domba {
            color: #B5FFB0;
            border-color: #B5FFB0;
            box-shadow: 0 3px 0 #8CD987;
            text-shadow: 1px 1px 0 #F0FFEF;
        }

        .animal-name.kucing {
            color: #FF6B9D;
            border-color: #FF6B9D;
            box-shadow: 0 3px 0 #E6507D;
            text-shadow: 1px 1px 0 #FFE6EE;
        }

        .animal-name.kelinci {
            color: #D9B8FF;
            border-color: #D9B8FF;
            box-shadow: 0 3px 0 #B88CE6;
            text-shadow: 1px 1px 0 #F5EFFF;
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid #ff9ebb;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: #ff6b9d;
            z-index: 10;
            transition: all 0.2s;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }

        .carousel-nav:hover {
            background-color: #ff9ebb;
            color: white;
            transform: translateY(-50%) scale(1.08);
        }

        .carousel-nav:active {
            transform: translateY(-50%) scale(0.95);
        }

        .carousel-prev {
            left: 15px;
        }

        .carousel-next {
            right: 15px;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ddd;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        /* WARNA DOT SESUAI HEWAN */
        .dot.ayam.active {
            background-color: #FFD166;
            border-color: #FFD166;
        }

        .dot.bebek.active {
            background-color: #5CC5FF;
            border-color: #5CC5FF;
        }

        .dot.domba.active {
            background-color: #B5FFB0;
            border-color: #B5FFB0;
        }

        .dot.kucing.active {
            background-color: #FF6B9D;
            border-color: #FF6B9D;
        }

        .dot.kelinci.active {
            background-color: #D9B8FF;
            border-color: #D9B8FF;
        }

        .dot:hover {
            transform: scale(1.1);
        }

        .select-button-container {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .select-button {
            background: linear-gradient(135deg, #b5ffb0 0%, #7dff75 100%);
            color: #226622;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #5cc553;
            border: 2px solid #7dff75;
        }

        .select-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #5cc553;
        }

        .select-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 0 #5cc553;
        }

        .select-button.selected {
            background: linear-gradient(135deg, #ffd166 0%, #ffb900 100%);
            color: #664400;
            box-shadow: 0 4px 0 #d69900;
            border: 2px solid #ffb900;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            color: #888;
            font-size: 0.75rem;
            padding-top: 10px;
            border-top: 1px dashed #ffb6c1;
            width: 100%;
        }

        .floating {
            position: fixed;
            z-index: -1;
            opacity: 0.08;
            pointer-events: none;
            font-size: 35px;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(8deg); }
        }

        .float1 { top: 10%; left: 5%; color: #ff6b9d; animation-delay: 0s; }
        .float2 { top: 20%; right: 10%; color: #5cc5ff; animation-delay: 2s; }
        .float3 { bottom: 15%; left: 8%; color: #b5ffb0; animation-delay: 4s; }

        @keyframes animalFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }

        .animal-image {
            animation: animalFloat 4s ease-in-out infinite;
        }

        .carousel-item.active .animal-image {
            filter: drop-shadow(0 0 15px rgba(255, 107, 157, 0.2)) 
                    drop-shadow(0 3px 8px rgba(0, 0, 0, 0.1));
        }

        @media (max-width: 768px) {
            .container {
                max-height: 580px;
            }
            
            .carousel {
                height: 300px;
            }
            
            .animal-image-container {
                width: 180px;
                height: 180px;
            }
            
            .animal-name {
                font-size: 1.2rem;
                padding: 5px 15px;
                min-width: 130px;
            }
            
            .carousel-nav {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            
            .carousel-prev {
                left: 10px;
            }
            
            .carousel-next {
                right: 10px;
            }
            
            .back-button {
                position: relative;
                left: 0;
                top: 0;
                margin-bottom: 10px;
            }
            
            .page-title {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .carousel {
                height: 280px;
            }
            
            .animal-image-container {
                width: 160px;
                height: 160px;
            }
            
            .animal-name {
                font-size: 1.1rem;
                padding: 4px 12px;
                min-width: 120px;
            }
            
            .page-title {
                font-size: 1.4rem;
            }
            
            .select-button {
                padding: 10px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Audio untuk background music -->
    <audio id="backgroundMusic" loop>
        <source src="assets/backsound/homepage.mp3" type="audio/mpeg">
        Browser Anda tidak mendukung pemutaran audio.
    </audio>

    <!-- Audio untuk suara hewan -->
    <audio id="animalSound"></audio>

    <div class="floating float1">🐱</div>
    <div class="floating float2">🐰</div>
    <div class="floating float3">🐔</div>

    <div class="container">
        <button class="back-button" id="backBtn">
            <i class="fas fa-arrow-left"></i> Kembali
        </button>

        <div class="header">
            <h1 class="page-title">PILIH HEWAN</h1>
            <div class="page-subtitle">Geser untuk melihat semua hewan</div>
        </div>

        <div class="carousel-container">
            <div class="carousel-nav carousel-prev" id="prevBtn">
                <i class="fas fa-chevron-left"></i>
            </div>
            
            <div class="carousel-nav carousel-next" id="nextBtn">
                <i class="fas fa-chevron-right"></i>
            </div>
            
            <div class="carousel">
                <div class="carousel-track" id="carouselTrack"></div>
            </div>
            
            <div class="carousel-dots" id="carouselDots"></div>
            
            <div class="select-button-container">
                <button class="select-button" id="selectButton">
                    <i class="fas fa-paw"></i> PILIH HEWAN INI
                </button>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Doodle Critters | Game Kelompok 4</p>
        </div>
    </div>

    <script>
        const animals = [
            {
                id: "chicken",
                name: "Ayam",
                asset: "assets/ayam/ayam_dewasa_hadap_kanan_idle.png",
                color: "#FFD166",
                class: "ayam",
                sound: "assets/backsound/ayam.mp3"
            },
            {
                id: "duck",
                name: "Bebek",
                asset: "assets/bebek/ibu_hadap_kanan.png",
                color: "#5CC5FF",
                class: "bebek",
                sound: "assets/backsound/bebek.mp3"
            },
            {
                id: "sheep",
                name: "Domba",
                asset: "assets/domba/ibu_kanan_jalan.png",
                color: "#B5FFB0",
                class: "domba",
                sound: "assets/backsound/domba.mp3"
            },
            {
                id: "cat",
                name: "Kucing",
                asset: "assets/kucing/kucing_dewasa_hadap_kanan.png",
                color: "#FF6B9D",
                class: "kucing",
                sound: "assets/backsound/kucing.mp3"
            },
            {
                id: "rabbit",
                name: "Kelinci",
                asset: "assets/kelinci/kelinci_dewasa_hadap_kanan.png",
                color: "#D9B8FF",
                class: "kelinci",
                sound: "assets/backsound/kelinci.mp3"
            }
        ];

        let currentIndex = 0;
        let selectedAnimal = null;
        let isAnimating = false;
        const ANIMATION_DURATION = 400; // ms
        
        // ========== SISTEM GAMEPAD ==========
        let gamepadConnected = false;
        let gamepadIndex = null;
        let currentGamepadType = 'standard';
        let gamepadPollingInterval = null;
        let gamepadVibrationSupported = false;
        let lastButtonState = {};
        
        // GAMEPAD MAPPING
        const gamepadMappings = {
            'standard': {
                UP: 12,
                DOWN: 13,
                LEFT: 14,
                RIGHT: 15,
                A: 0,
                B: 1,
                X: 2,
                Y: 3,
                START: 9,
                SELECT: 8,
                LB: 4,
                RB: 5,
                LT: 6,
                RT: 7,
                LS: 10,
                RS: 11
            },
            'xbox': {
                UP: 12,
                DOWN: 13,
                LEFT: 14,
                RIGHT: 15,
                A: 0,
                B: 1,
                X: 2,
                Y: 3,
                START: 9,
                SELECT: 8,
                LB: 4,
                RB: 5,
                LT: 6,
                RT: 7,
                LS: 10,
                RS: 11
            },
            'playstation': {
                UP: 12,
                DOWN: 13,
                LEFT: 14,
                RIGHT: 15,
                CROSS: 0,
                CIRCLE: 1,
                SQUARE: 2,
                TRIANGLE: 3,
                START: 9,
                SELECT: 8,
                L1: 4,
                R1: 5,
                L2: 6,
                R2: 7,
                L3: 10,
                R3: 11
            },
            'nintendo': {
                UP: 12,
                DOWN: 13,
                LEFT: 14,
                RIGHT: 15,
                B: 0,
                A: 1,
                Y: 2,
                X: 3,
                PLUS: 9,
                MINUS: 8,
                L: 4,
                R: 5,
                ZL: 6,
                ZR: 7,
                LS: 10,
                RS: 11
            },
            'generic': {
                UP: 12,
                DOWN: 13,
                LEFT: 14,
                RIGHT: 15,
                A: 0,
                B: 1,
                X: 2,
                Y: 3,
                START: 9,
                SELECT: 8,
                LB: 4,
                RB: 5,
                LT: 6,
                RT: 7,
                LS: 10,
                RS: 11
            }
        };
        
        // Inisialisasi audio
        const backgroundMusic = document.getElementById('backgroundMusic');
        const animalSound = document.getElementById('animalSound');

        // ========== SISTEM AUDIO TERPUSAT ==========
        function updateAudioVolume() {
            const masterVolume = parseFloat(localStorage.getItem('masterVolume')) || 0.7;
            const isMuted = localStorage.getItem('isMuted') === 'true';
            
            if (isMuted) {
                backgroundMusic.volume = 0;
            } else {
                backgroundMusic.volume = masterVolume;
            }
            
            window.currentVolume = isMuted ? 0 : masterVolume;
        }

        function playBackgroundMusic() {
            updateAudioVolume();
            
            backgroundMusic.play().catch(e => {
                console.log("Autoplay prevented:", e);
                document.addEventListener('click', function initAudio() {
                    backgroundMusic.play();
                    document.removeEventListener('click', initAudio);
                }, { once: true });
            });
        }

        function playAnimalSound(soundFile) {
            updateAudioVolume();
            
            animalSound.src = soundFile;
            animalSound.volume = window.currentVolume;
            
            animalSound.play().catch(e => {
                console.log("Error playing animal sound:", e);
            });
        }

        // ========== FUNGSI GAMEPAD ==========
        function detectGamepadType(id) {
            const idLower = id.toLowerCase();
            
            if (idLower.includes('xbox') || idLower.includes('microsoft')) {
                return 'xbox';
            } else if (idLower.includes('playstation') || idLower.includes('ps3') || idLower.includes('ps4') || idLower.includes('ps5') || idLower.includes('dualshock') || idLower.includes('dualsense')) {
                return 'playstation';
            } else if (idLower.includes('nintendo') || idLower.includes('switch') || idLower.includes('pro controller') || idLower.includes('joy-con')) {
                return 'nintendo';
            } else {
                return 'generic';
            }
        }

        function triggerGamepadVibration(pattern) {
            if (!gamepadVibrationSupported) return;
            
            try {
                if (gamepadConnected && gamepadIndex !== null) {
                    const gamepads = navigator.getGamepads();
                    const gamepad = gamepads[gamepadIndex];
                    
                    if (gamepad && gamepad.vibrationActuator) {
                        gamepad.vibrationActuator.playEffect("dual-rumble", {
                            startDelay: 0,
                            duration: pattern[0] || 100,
                            weakMagnitude: pattern[1] || 0.5,
                            strongMagnitude: pattern[2] || 0.5
                        });
                        return;
                    }
                }
                
                if (navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            } catch (error) {
                console.log('Vibration not supported:', error);
            }
        }

        function handleGamepadButtonA() {
            console.log('🎮 Tombol A/CROSS ditekan - Konfirmasi hewan');
            selectCurrentAnimal();
            triggerGamepadVibration([50, 0.3, 0.5]);
            return true;
        }

        function handleGamepadButtonB() {
            console.log('🎮 Tombol B/CIRCLE ditekan - Kembali ke menu');
            triggerGamepadVibration([50, 0.3, 0.5]);
            window.location.href = 'index.html';
            return true;
        }

        function handleGamepadButtonY() {
            console.log('🎮 Tombol Y/TRIANGLE ditekan - Mainkan suara hewan');
            
            if (selectedAnimal) {
                playAnimalSound(selectedAnimal.sound);
                triggerGamepadVibration([100, 0.2, 0.3]);
            }
            return true;
        }

        let lastSlideTime = 0;
        const slideCooldown = 500; // ms - dinaikkan agar lebih smooth

        function pollGamepad() {
            if (!gamepadConnected || gamepadIndex === null || isAnimating) return;
            
            try {
                const gamepads = navigator.getGamepads();
                if (!gamepads || !gamepads[gamepadIndex]) {
                    gamepadConnected = false;
                    gamepadIndex = null;
                    if (gamepadPollingInterval) {
                        clearInterval(gamepadPollingInterval);
                        gamepadPollingInterval = null;
                    }
                    return;
                }
                
                const gamepad = gamepads[gamepadIndex];
                const mapping = gamepadMappings[currentGamepadType] || gamepadMappings.standard;
                
                const currentButtonState = {};
                
                // Tombol A - Konfirmasi hewan
                if (gamepad.buttons[mapping.A]?.pressed) {
                    currentButtonState.A = true;
                    if (!lastButtonState.A) {
                        handleGamepadButtonA();
                    }
                } else {
                    currentButtonState.A = false;
                }
                
                // Tombol B - Kembali
                if (gamepad.buttons[mapping.B]?.pressed) {
                    currentButtonState.B = true;
                    if (!lastButtonState.B) {
                        handleGamepadButtonB();
                    }
                } else {
                    currentButtonState.B = false;
                }
                
                // Tombol Y - Mainkan suara hewan
                if (gamepad.buttons[mapping.Y]?.pressed) {
                    currentButtonState.Y = true;
                    if (!lastButtonState.Y) {
                        handleGamepadButtonY();
                    }
                } else {
                    currentButtonState.Y = false;
                }
                
                lastButtonState = { ...currentButtonState };
                
                // KONTROL NAVIGASI DENGAN D-PAD DAN ANALOG STICK
                const currentTime = Date.now();
                if (currentTime - lastSlideTime > slideCooldown) {
                    let moveX = 0;
                    
                    // Gunakan analog stick kiri jika tersedia
                    if (gamepad.axes && gamepad.axes.length >= 2) {
                        moveX = gamepad.axes[0];
                    }
                    
                    // Gunakan D-pad jika analog stick di deadzone
                    const deadzone = 0.5;
                    if (Math.abs(moveX) < deadzone) {
                        if (gamepad.buttons[mapping.LEFT]?.pressed) {
                            moveX = -1;
                        } else if (gamepad.buttons[mapping.RIGHT]?.pressed) {
                            moveX = 1;
                        }
                    }
                    
                    // Geser hewan berdasarkan input gamepad
                    if (moveX > deadzone) {
                        nextSlide();
                        lastSlideTime = currentTime;
                        triggerGamepadVibration([20, 0.1, 0.2]);
                    } else if (moveX < -deadzone) {
                        prevSlide();
                        lastSlideTime = currentTime;
                        triggerGamepadVibration([20, 0.1, 0.2]);
                    }
                }
                
            } catch (error) {
                console.error('Error polling gamepad:', error);
            }
        }

        function checkGamepadSupport() {
            if ('getGamepads' in navigator) {
                console.log('🎮 Gamepad API didukung');
                
                const gamepads = navigator.getGamepads();
                for (let i = 0; i < gamepads.length; i++) {
                    if (gamepads[i]) {
                        console.log(`🎮 Gamepad sudah terhubung: ${gamepads[i].id}`);
                        gamepadConnected = true;
                        gamepadIndex = i;
                        currentGamepadType = detectGamepadType(gamepads[i].id);
                        
                        if (!gamepadPollingInterval) {
                            gamepadPollingInterval = setInterval(pollGamepad, 100); // Lebih lambat
                        }
                        break;
                    }
                }
                
                return true;
            } else {
                console.log('⚠️ Gamepad API tidak didukung');
                return false;
            }
        }

        // ========== FUNGSI CAROUSEL ==========
        function loadSavedSelection() {
            const savedAnimalId = localStorage.getItem('selectedCharacter');
            if (savedAnimalId) {
                const index = animals.findIndex(a => a.id === savedAnimalId);
                if (index !== -1) {
                    currentIndex = index;
                    selectedAnimal = animals[index];
                    updateSelectButton();
                }
            }
        }

        function renderCarousel() {
            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('carouselDots');
            
            track.innerHTML = '';
            dotsContainer.innerHTML = '';
            
            animals.forEach((animal, index) => {
                const item = document.createElement('div');
                item.className = 'carousel-item';
                if (index === currentIndex) item.classList.add('active');
                item.dataset.index = index;
                
                item.innerHTML = `
                    <div class="animal-image-container">
                        <img src="${animal.asset}" alt="${animal.name}" class="animal-image">
                    </div>
                    <div class="animal-name ${animal.class}" style="color: ${animal.color};">${animal.name}</div>
                `;
                
                // Tambahkan event listener untuk memainkan suara saat diklik
                item.addEventListener('click', () => {
                    playAnimalSound(animal.sound);
                });
                
                track.appendChild(item);
                
                const dot = document.createElement('div');
                dot.className = `dot ${animal.class}`;
                if (index === currentIndex) dot.classList.add('active');
                dot.dataset.index = index;
                dot.addEventListener('click', () => goToSlide(index));
                dotsContainer.appendChild(dot);
            });
        }

        function updateCarouselPosition(instant = false) {
            const track = document.getElementById('carouselTrack');
            const translateX = -currentIndex * 100;
            
            if (instant) {
                track.style.transition = 'none';
                track.style.transform = `translateX(${translateX}%)`;
                // Force reflow
                track.offsetHeight;
                track.style.transition = `transform ${ANIMATION_DURATION}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
            } else {
                track.style.transform = `translateX(${translateX}%)`;
            }
            
            document.querySelectorAll('.carousel-item').forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        function updateSelectButton() {
            const button = document.getElementById('selectButton');
            const savedAnimalId = localStorage.getItem('selectedCharacter');
            
            if (selectedAnimal && selectedAnimal.id === savedAnimalId) {
                button.innerHTML = '<i class="fas fa-check"></i> TELAH DIPILIH';
                button.classList.add('selected');
            } else {
                button.innerHTML = '<i class="fas fa-paw"></i> PILIH HEWAN INI';
                button.classList.remove('selected');
            }
        }

        function goToSlide(index, instant = false) {
            if (isAnimating) return;
            
            isAnimating = true;
            currentIndex = index;
            selectedAnimal = animals[currentIndex];
            
            updateCarouselPosition(instant);
            updateDots();
            updateSelectButton();
            
            setTimeout(() => {
                isAnimating = false;
            }, ANIMATION_DURATION);
        }

        function nextSlide() {
            if (isAnimating) return;
            
            isAnimating = true;
            
            // Cek apakah ini perpindahan dari item terakhir ke pertama
            const isLastToFirst = currentIndex === animals.length - 1;
            
            if (isLastToFirst) {
                // Tambahkan clone dari item pertama di akhir untuk animasi yang smooth
                const track = document.getElementById('carouselTrack');
                const firstItem = track.children[0].cloneNode(true);
                track.appendChild(firstItem);
                
                // Geser ke clone
                currentIndex = animals.length; // Index ke "clone"
                selectedAnimal = animals[0];
                
                updateCarouselPosition(false);
                updateDots();
                updateSelectButton();
                
                // Setelah animasi selesai, reset ke item pertama tanpa animasi
                setTimeout(() => {
                    track.style.transition = 'none';
                    currentIndex = 0;
                    updateCarouselPosition(true);
                    
                    // Hapus clone
                    setTimeout(() => {
                        track.removeChild(firstItem);
                        isAnimating = false;
                    }, 50);
                }, ANIMATION_DURATION);
            } else {
                currentIndex = (currentIndex + 1) % animals.length;
                selectedAnimal = animals[currentIndex];
                
                updateCarouselPosition(false);
                updateDots();
                updateSelectButton();
                
                setTimeout(() => {
                    isAnimating = false;
                }, ANIMATION_DURATION);
            }
        }

        function prevSlide() {
            if (isAnimating) return;
            
            isAnimating = true;
            
            // Cek apakah ini perpindahan dari item pertama ke terakhir
            const isFirstToLast = currentIndex === 0;
            
            if (isFirstToLast) {
                // Tambahkan clone dari item terakhir di awal untuk animasi yang smooth
                const track = document.getElementById('carouselTrack');
                const lastItem = track.children[animals.length - 1].cloneNode(true);
                track.insertBefore(lastItem, track.firstChild);
                
                // Posisikan track ke clone
                track.style.transition = 'none';
                track.style.transform = `translateX(-100%)`; // Geser ke posisi clone
                track.offsetHeight; // Force reflow
                track.style.transition = `transform ${ANIMATION_DURATION}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
                
                // Geser kembali ke item terakhir asli
                currentIndex = animals.length - 1;
                selectedAnimal = animals[currentIndex];
                
                updateCarouselPosition(false);
                updateDots();
                updateSelectButton();
                
                // Setelah animasi selesai, hapus clone
                setTimeout(() => {
                    track.style.transition = 'none';
                    track.removeChild(lastItem);
                    updateCarouselPosition(true);
                    
                    setTimeout(() => {
                        isAnimating = false;
                    }, 50);
                }, ANIMATION_DURATION);
            } else {
                currentIndex = (currentIndex - 1 + animals.length) % animals.length;
                selectedAnimal = animals[currentIndex];
                
                updateCarouselPosition(false);
                updateDots();
                updateSelectButton();
                
                setTimeout(() => {
                    isAnimating = false;
                }, ANIMATION_DURATION);
            }
        }

        function selectCurrentAnimal() {
            if (selectedAnimal) {
                localStorage.setItem('selectedCharacter', selectedAnimal.id);
                updateSelectButton();
                
                const button = document.getElementById('selectButton');
                button.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    button.style.transform = 'scale(1)';
                    // LANGSUNG KEMBALI KE INDEX.HTML
                    window.location.href = 'index.html';
                }, 150);
            }
        }

        // ========== INISIALISASI ==========
        loadSavedSelection();
        renderCarousel();
        updateCarouselPosition(true);
        selectedAnimal = animals[currentIndex];
        updateSelectButton();

        // Mulai background music
        playBackgroundMusic();

        // Inisialisasi volume default jika belum ada
        if (!localStorage.getItem('masterVolume')) {
            localStorage.setItem('masterVolume', '0.7');
            localStorage.setItem('isMuted', 'false');
        }

        // Inisialisasi gamepad
        checkGamepadSupport();

        // Perbarui volume setiap detik
        setInterval(updateAudioVolume, 1000);

        // ========== EVENT LISTENERS ==========
        document.getElementById('prevBtn').addEventListener('click', prevSlide);
        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('selectButton').addEventListener('click', selectCurrentAnimal);
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // Kontrol keyboard untuk testing
        document.addEventListener('keydown', function(e) {
            if (isAnimating) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    prevSlide();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    nextSlide();
                    break;
                case 'Enter':
                case 'a':
                case 'A':
                    e.preventDefault();
                    selectCurrentAnimal();
                    break;
                case 'Escape':
                case 'b':
                case 'B':
                    e.preventDefault();
                    window.location.href = 'index.html';
                    break;
                case 'y':
                case 'Y':
                    e.preventDefault();
                    if (selectedAnimal) {
                        playAnimalSound(selectedAnimal.sound);
                    }
                    break;
                case ' ':
                    e.preventDefault();
                    if (selectedAnimal) {
                        playAnimalSound(selectedAnimal.sound);
                    }
                    break;
            }
        });

        // Swipe untuk mobile
        let startX = 0;
        let startY = 0;
        let isSwiping = false;
        
        document.querySelector('.carousel').addEventListener('touchstart', function(e) {
            if (isAnimating) return;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isSwiping = true;
        });

        document.querySelector('.carousel').addEventListener('touchmove', function(e) {
            if (!isSwiping || isAnimating) return;
            e.preventDefault();
        });

        document.querySelector('.carousel').addEventListener('touchend', function(e) {
            if (!isSwiping || isAnimating) return;
            
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = startX - endX;
            const diffY = Math.abs(startY - endY);
            
            // Hanya proses jika perbedaan horizontal lebih besar dari vertikal (swipe horizontal)
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 30) {
                if (diffX > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
            
            isSwiping = false;
        });

        // ========== GAMEPAD EVENT LISTENERS ==========
        window.addEventListener("gamepadconnected", function(e) {
            console.log(`🎮 Gamepad terhubung: ${e.gamepad.id} (Index: ${e.gamepad.index})`);
            
            gamepadConnected = true;
            gamepadIndex = e.gamepad.index;
            currentGamepadType = detectGamepadType(e.gamepad.id);
            
            if (!gamepadPollingInterval) {
                gamepadPollingInterval = setInterval(pollGamepad, 100);
            }
            
            triggerGamepadVibration([100, 0.3, 0.7]);
        });

        window.addEventListener("gamepaddisconnected", function(e) {
            console.log(`🎮 Gamepad terputus: ${e.gamepad.id}`);
            gamepadConnected = false;
            gamepadIndex = null;
            
            if (gamepadPollingInterval) {
                clearInterval(gamepadPollingInterval);
                gamepadPollingInterval = null;
            }
        });

        console.log('🎮 Halaman Pilih Hewan - Sistem Gamepad Aktif');
        console.log('🎮 Kontrol: D-PAD/Stick kiri untuk geser hewan, A untuk konfirmasi, B untuk kembali, Y untuk suara hewan');
        console.log('🎯 Carousel diperbaiki: pergeseran dari ayam ke kelinci dan sebaliknya sekarang smooth!');
    </script>
</body>
</html>
