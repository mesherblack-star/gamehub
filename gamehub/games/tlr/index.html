<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Runner - Menu</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #000;
}

.background-container {
    width: 100vw;
    height: 100vh;
    background-image: url('assets/THE LAST RUNNER.png');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
}

.cloud-layer {
    position: absolute;
    overflow: hidden;
    pointer-events: none;
    z-index: 2;
}

.cloud {
    position: absolute;
    width: 300px;
    image-rendering: pixelated;
    animation: cloudMove 25s linear infinite;
}

.cloud-low {
    top: 0px;
    animation-duration: 22s;
}

.cloud-mid {
    top: 35px;
    animation-duration: 28s;
}

.cloud-high {
    top: 70px;
    animation-duration: 34s;
}

.cloud:nth-child(2) { animation-delay: -12s; }
.cloud:nth-child(3) { animation-delay: -20s; }

@keyframes cloudMove {
    from { left: 100%; }
    to   { left: -300px; }
}

/* BAGIAN TOMBOL PLAY */
.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 3;
    /* Transisi halus saat kembali ke ukuran normal */
    transition: transform 0.2s ease-in-out;
}

.play-button img {
    width: 200px;
    image-rendering: pixelated;
    display: block;
    /* Transisi untuk efek brightness */
    transition: filter 0.2s ease-in-out;
}

/* EFEK HOVER: Membesar dan sedikit lebih terang */
.play-button:hover {
    transform: translate(-50%, -50%) scale(1.15);
}

.play-button:hover img {
    filter: brightness(1.2);
}

/* Efek saat diklik (sedikit mengecil) */
.play-button:active {
    transform: translate(-50%, -50%) scale(0.95);
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<div class="background-container" id="bg">

    <div class="cloud-layer" id="cloudLayer">
        <img src="assets/awan.png" class="cloud cloud-low">
        <img src="assets/awan.png" class="cloud cloud-mid">
        <img src="assets/awan.png" class="cloud cloud-high">
    </div>

    <a href="guide.html" class="play-button" id="playBtn">
        <img src="assets/play.png" alt="Play">
    </a>

</div>

<script>
const bg = document.getElementById("bg");
const cloudLayer = document.getElementById("cloudLayer");
const bgMusic = document.getElementById("bgMusic");
const bgImage = new Image();

bgImage.src = "assets/THE LAST RUNNER.png";

bgImage.onload = () => {
    const cw = bg.clientWidth;
    const ch = bg.clientHeight;
    const ir = bgImage.width / bgImage.height;
    const cr = cw / ch;

    let rw, rh;

    if (ir > cr) {
        rw = cw;
        rh = cw / ir;
    } else {
        rh = ch;
        rw = ch * ir;
    }

    const ox = (cw - rw) / 2;
    const oy = (ch - rh) / 2;

    cloudLayer.style.left = ox + "px";
    cloudLayer.style.top  = (oy + 0) + "px"; 
    cloudLayer.style.width  = rw + "px";
    cloudLayer.style.height = "220px";
};

function startMusic() {
    bgMusic.play().then(() => {
        console.log("Musik diputar!");
        window.removeEventListener('click', startMusic);
        window.removeEventListener('touchstart', startMusic);
    }).catch(error => {
        console.log("Autoplay diblokir browser.");
    });
}

window.addEventListener('click', startMusic);
window.addEventListener('touchstart', startMusic);
window.addEventListener('mouseenter', startMusic);
</script>

</body>
</html>
